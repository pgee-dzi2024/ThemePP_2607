{% load static %}

<!DOCTYPE html>
<html lang="bg">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}CSV Manager{% endblock %}</title>

    <link href="{% static 'css/sb-admin-2.min.css' %}" rel="stylesheet">

    <style>
        img { max-width: 100%; height: auto; }
        .card { border-radius: 12px; }
    </style>
</head>

<body>

<div id="wrapper">

<ul class="navbar-nav bg-gradient-primary sidebar sidebar-dark">

    <a class="sidebar-brand d-flex align-items-center justify-content-center" href="/">
        <div class="mx-2"><b>CSV Manager</b></div>
    </a>

    <hr class="sidebar-divider">

    <li class="nav-item">
        <a class="nav-link" href="/">Табло за управление</a>
    </li>

    <li class="nav-item">
        <a class="nav-link" href="{% url 'about' %}">Информация</a>
    </li>

    <li class="nav-item">
        <a class="nav-link" href="{% url 'history' %}">История</a>
    </li>

    <li class="nav-item">
        <a class="nav-link" href="{% url 'logout' %}">Изход</a>
    </li>

    <hr class="sidebar-divider">

    <!-- ФИЛТРИ -->
    <li class="nav-item px-3">

        <label class="text-white small">Филтър</label>
        <select id="filter" class="form-control mb-2">
            <option value="">Без филтър</option>
            <option value="≥ 50">≥ 50</option>
            <option value="≥ 100">≥ 100</option>
            <option value="≥ 500">≥ 500</option>
        </select>

        <label class="text-white small">Групиране</label>
        <select id="group" class="form-control mb-3">
            <option value="">Без групиране</option>
            <option value="month">По месец</option>
        </select>

        <button onclick="applyFilters()" class="btn btn-success w-100">
            Приложи
        </button>

    </li>

</ul>

<div id="content-wrapper" class="d-flex flex-column">
    <div id="content">
        <div class="container-fluid">
            {% block content %}{% endblock %}
        </div>
    </div>
</div>

</div>

<script>
function applyFilters() {
    document.getElementById("hiddenFilter").value = document.getElementById("filter").value;
    document.getElementById("hiddenGroup").value = document.getElementById("group").value;
    document.getElementById("mainForm").submit();
}
</script>

</body>
</html>
